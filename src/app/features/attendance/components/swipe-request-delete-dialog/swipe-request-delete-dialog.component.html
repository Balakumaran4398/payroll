<div class="swipe-delete-dialog">
  <div class="swipe-delete-dialog__head">
    <div class="swipe-delete-dialog__head-copy">
      <p class="swipe-delete-dialog__eyebrow">Confirm action</p>
      <h2>Delete {{ data.request.display_id }}?</h2>
    </div>

    <button mat-icon-button class="close-button" (click)="close()" aria-label="Close swipe delete dialog">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="swipe-delete-dialog__body">
    <div class="swipe-delete-dialog__icon">
      <mat-icon>delete_forever</mat-icon>
    </div>

    <p class="swipe-delete-dialog__copy">This removes the selected swipe regularization request from the table.</p>

    <div class="swipe-delete-dialog__meta">
      <span>Employee #{{ data.request.empid }}</span>
      <span>{{ data.request.attendance_date }}</span>
      <span>{{ data.request.display_date_time }}</span>
    </div>
  </div>

  <div class="swipe-delete-dialog__actions">
    <button mat-stroked-button (click)="close()">Cancel</button>
    <button mat-flat-button class="danger-action" (click)="confirm()">Delete</button>
  </div>
</div>
