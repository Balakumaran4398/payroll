<div class="permission-form-dialog">
    <div class="permission-form-dialog__head">
        <div class="permission-form-dialog__head-copy">
            <p class="permission-form-dialog__eyebrow">Edit permission request</p>
            <h2>{{ request.employee_name }}</h2>
            <p>{{ request.request_type || 'Apply permission' }}</p>
        </div>

        <button mat-icon-button class="close-button" (click)="close()" aria-label="Close permission edit dialog">
            <mat-icon>close</mat-icon>
        </button>
    </div>

    <div class="permission-form-dialog__body">
        <p class="permission-form-dialog__hint" *ngIf="dialogHint">{{ dialogHint }}</p>

        <div class="permission-form-grid">
            <mat-form-field class="field" appearance="outline">
                <mat-label>Permission Date</mat-label>
                <input matInput [matDatepicker]="permissionDatePicker" [disabled]="!canEditRequestDetails" [(ngModel)]="request.request_date">
                <mat-datepicker-toggle matSuffix [for]="permissionDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #permissionDatePicker></mat-datepicker>
            </mat-form-field>
            <mat-form-field class="field" appearance="outline">
                <mat-label>Permission Type</mat-label>
                <mat-select [(ngModel)]="request.mode" [disabled]="!canEditRequestDetails">
                    <mat-option *ngFor="let option of permissionTypes" [value]="option">{{ option }}</mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field class="field field--time" appearance="outline">
                <mat-label>Start Time</mat-label>
                <input #permissionStartInput matInput type="time" [disabled]="!canEditRequestDetails" [(ngModel)]="request.starttime">
                <button type="button" mat-icon-button matSuffix aria-label="Open permission start time picker"
                    [disabled]="!canEditRequestDetails"
                    (click)="openTimePicker(permissionStartInput)">
                    <mat-icon>schedule</mat-icon>
                </button>
            </mat-form-field>

            <mat-form-field class="field field--time" appearance="outline">
                <mat-label>End Time</mat-label>
                <input #permissionEndInput matInput type="time" [disabled]="!canEditRequestDetails" [(ngModel)]="request.endtime">
                <button type="button" mat-icon-button matSuffix aria-label="Open permission end time picker"
                    [disabled]="!canEditRequestDetails"
                    (click)="openTimePicker(permissionEndInput)">
                    <mat-icon>schedule</mat-icon>
                </button>
            </mat-form-field>
            <mat-form-field class="field" appearance="outline">
                <mat-label>Reason</mat-label>
                <textarea matInput rows="1" [disabled]="!canEditRequestDetails" [(ngModel)]="request.reason"></textarea>
            </mat-form-field>

            <mat-form-field class="field" appearance="outline">
                <mat-label>Approval Status</mat-label>
                <mat-select [(ngModel)]="request.approved_status" [disabled]="!canApprove">
                    <mat-option *ngFor="let status of approvalStatusOptions" [value]="status">{{ status === 'Rejected' ?
                        'Rejected'
                        : status }}</mat-option>
                </mat-select>
            </mat-form-field>
        </div>
    </div>

    <div class="permission-form-dialog__actions">
        <button mat-stroked-button [disabled]="submitting" (click)="close()">Cancel</button>
        <button mat-flat-button color="primary" [disabled]="submitting" (click)="save()">
            {{ submitting ? 'Saving...' : 'Save Changes' }}
        </button>
    </div>
</div>
