<div class="swipe-form-dialog">
  <div class="swipe-form-dialog__head">
    <div class="swipe-form-dialog__head-copy">
      <p class="swipe-form-dialog__eyebrow">Edit swipe request</p>
      <h2>{{ request.employee_name }}</h2>
      <p>{{ request.request_type || 'Regularize swipe' }}</p>
    </div>

    <button mat-icon-button class="close-button" (click)="close()" aria-label="Close swipe edit dialog">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <div class="swipe-form-dialog__body">
    <p class="swipe-form-dialog__hint" *ngIf="dialogHint">{{ dialogHint }}</p>

    <div class="swipe-form-grid">
      <mat-form-field class="field" appearance="outline">
        <mat-label>Attendance Date</mat-label>
        <input matInput [matDatepicker]="swipeDatePicker" [disabled]="!canEditRequestDetails" [(ngModel)]="request.request_date">
        <mat-datepicker-toggle matSuffix [for]="swipeDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #swipeDatePicker></mat-datepicker>
      </mat-form-field>

      <mat-form-field class="field" appearance="outline">
        <mat-label>Permission Type</mat-label>
        <mat-select [(ngModel)]="request.mode" [disabled]="!canEditRequestDetails">
          <mat-option *ngFor="let option of permissionTypes" [value]="option">{{ option }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="field field--time" appearance="outline">
        <mat-label>Punch Time</mat-label>
        <input #expectedInInput matInput type="time" [disabled]="!canEditRequestDetails" [(ngModel)]="request.punch_time">
        <button type="button" mat-icon-button matSuffix aria-label="Open expected in time picker"
          [disabled]="!canEditRequestDetails"
          (click)="openTimePicker(expectedInInput)">
          <mat-icon>schedule</mat-icon>
        </button>
      </mat-form-field>
      <mat-form-field class="field" appearance="outline">
        <mat-label>Approval Status</mat-label>
        <mat-select [(ngModel)]="request.approved_status" [disabled]="!canApprove">
          <mat-option *ngFor="let status of approvalStatusOptions" [value]="status">{{ status === 'Rejected' ?
            'Rejected'
            : status }}</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="field " appearance="outline">
        <mat-label>Reason</mat-label>
        <textarea matInput rows="1" [disabled]="!canEditRequestDetails" [(ngModel)]="request.reason"></textarea>
      </mat-form-field>
    </div>
  </div>

  <div class="swipe-form-dialog__actions">
    <button mat-stroked-button [disabled]="submitting" (click)="close()">Cancel</button>
    <button mat-flat-button color="primary" [disabled]="submitting" (click)="save()">
      {{ submitting ? 'Saving...' : 'Save Changes' }}
    </button>
  </div>
</div>
