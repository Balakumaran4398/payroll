<ng-container *ngIf="state$ | async as state">
  <div class="global-loader" *ngIf="state.visible" [attr.data-mode]="state.mode" aria-live="polite" aria-busy="true">
    <div class="global-loader__backdrop"></div>

    <div class="global-loader__panel">
      <div class="global-loader__crest">
        <div class="pulse-ring pulse-ring--outer"></div>
        <div class="pulse-ring pulse-ring--inner"></div>
        <div class="crest-core">
          <mat-icon>workspace_premium</mat-icon>
        </div>
        <span class="orbit orbit--one"></span>
        <span class="orbit orbit--two"></span>
        <span class="orbit orbit--three"></span>
      </div>

      <div class="global-loader__copy">
        <h2>{{ state.headline }}</h2>
        <p>{{ state.caption }}</p>
      </div>
    </div>
  </div>
</ng-container>
